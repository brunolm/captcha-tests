<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifying you are human…</title>
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad&render=explicit"
      async
      defer
    ></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        text-align: center;
      }

      h1 {
        font-size: 20px;
        color: #333;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 24px;
      }

      #captcha-container {
        display: flex;
        justify-content: center;
      }

      #status {
        margin-top: 16px;
        font-size: 14px;
        color: #333;
      }

      .error {
        color: #c0392b !important;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>One more step…</h1>
      <p class="subtitle" id="subtitle">
        Please complete the security check to continue.
      </p>
      <div id="captcha-container"></div>
      <p id="status"></p>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const redirectUrl = params.get("url");

      const status = document.getElementById("status");
      const subtitle = document.getElementById("subtitle");

      if (!redirectUrl) {
        subtitle.textContent = "";
        status.textContent = "Missing ?url parameter.";
        status.classList.add("error");
      }

      // Cloudflare Turnstile test sitekeys:
      // 1x00000000000000000000AA - always passes (visible)
      // 2x00000000000000000000AB - always blocks (visible)
      // 3x00000000000000000000FF - forces interactive challenge
      const SITEKEY = "3x00000000000000000000FF";

      function onTurnstileLoad() {
        if (!redirectUrl) return;

        turnstile.render(document.getElementById("captcha-container"), {
          sitekey: SITEKEY,
          callback: () => {
            status.textContent = "Verified! Redirecting…";
            setTimeout(() => {
              window.location.href = redirectUrl;
            }, 1000);
          },
          "error-callback": () => {
            status.textContent = "Verification failed. Please try again.";
            status.classList.add("error");
          },
        });
      }
    </script>
  </body>
</html>
