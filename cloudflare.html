<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloudflare Captcha Demo</title>
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad&render=explicit"
      async
      defer
    ></script>
    <script
      src="https://www.google.com/recaptcha/api.js?onload=onRecaptchaLoad&render=explicit"
      async
      defer
    ></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        text-align: center;
      }

      .btn {
        padding: 12px 28px;
        font-size: 16px;
        background: #0051c3;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn:hover {
        background: #003d94;
      }

      .btn.cf {
        background: #f6821f;
      }

      .btn.cf:hover {
        background: #d96f15;
      }

      .btn.rc {
        background: #4285f4;
      }

      .btn.rc:hover {
        background: #3367c7;
      }

      .btn.mix {
        background: #7b2ff7;
      }

      .btn.mix:hover {
        background: #6322cc;
      }

      .btn + .btn {
        margin-left: 12px;
      }

      .button-row {
        margin-bottom: 12px;
      }

      .button-row:last-child {
        margin-bottom: 0;
      }

      #captcha-container {
        margin-top: 24px;
        display: none;
      }

      #captcha-container.visible {
        display: flex;
        justify-content: center;
      }

      #result {
        margin-top: 16px;
        font-size: 14px;
        color: #333;
        word-break: break-all;
        max-width: 400px;
      }

      #message {
        margin-top: 20px;
        padding: 14px 24px;
        font-size: 16px;
        color: #155724;
        background: #d4edda;
        border: 1px solid #c3e6cb;
        border-radius: 6px;
        display: none;
      }

      #message.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div>
        <div class="button-row">
          <button class="btn" id="submit-btn">Submit</button>
        </div>
        <div class="button-row">
          <button class="btn cf" id="captcha-btn">Submit with Captcha</button>
          <button class="btn rc" id="recaptcha-btn">
            Submit with reCAPTCHA
          </button>
        </div>
        <div class="button-row">
          <button class="btn cf" id="double-captcha-btn">
            Submit with Double Captcha
          </button>
          <button class="btn mix" id="multi-captcha-btn">
            Submit with Multi Captcha
          </button>
        </div>
        <div class="button-row">
          <button class="btn cf" id="captcha-redirect-btn">
            Submit with Captcha Redirect
          </button>
        </div>
      </div>
      <div id="captcha-container"></div>
      <div id="result"></div>
      <div id="message">Submitted successfully!</div>
    </div>

    <script>
      // Cloudflare Turnstile test sitekeys:
      // 1x00000000000000000000AA - always passes (visible)
      // 2x00000000000000000000AB - always blocks (visible)
      // 3x00000000000000000000FF - forces interactive challenge
      const SITEKEY = "3x00000000000000000000FF";

      let turnstileReady = false;
      let widgetId = null;

      function onTurnstileLoad() {
        turnstileReady = true;
      }

      const message = document.getElementById("message");

      function showMessage() {
        message.classList.add("visible");
      }

      function hideMessage() {
        message.classList.remove("visible");
      }

      function renderWidget() {
        const container = document.getElementById("captcha-container");
        container.innerHTML = "";
        container.classList.add("visible");
        document.getElementById("result").textContent = "";
        hideMessage();

        widgetId = turnstile.render(container, {
          sitekey: SITEKEY,
          callback: (token) => {
            document.getElementById("result").textContent =
              "Token: " + token.slice(0, 40) + "…";
            showMessage();
          },
          "error-callback": () => {
            document.getElementById("result").textContent =
              "Verification failed.";
          },
        });
      }

      document.getElementById("submit-btn").addEventListener("click", () => {
        showMessage();
      });

      if (new URLSearchParams(window.location.search).has("ok")) {
        showMessage();
      }

      let recaptchaReady = false;

      function onRecaptchaLoad() {
        recaptchaReady = true;
      }

      let doubleSolveCount = 0;
      let doubleWidgetId = null;

      document
        .getElementById("double-captcha-btn")
        .addEventListener("click", () => {
          if (!turnstileReady) return alert("Turnstile script still loading…");
          doubleSolveCount = 0;
          const container = document.getElementById("captcha-container");
          container.innerHTML = "";
          container.classList.add("visible");
          document.getElementById("result").textContent = "";
          hideMessage();

          function renderDoubleWidget() {
            container.innerHTML = "";
            doubleWidgetId = turnstile.render(container, {
              sitekey: SITEKEY,
              callback: () => {
                doubleSolveCount++;
                if (doubleSolveCount < 2) {
                  document.getElementById("result").textContent =
                    "Solve " + doubleSolveCount + "/2 — solve once more.";
                  setTimeout(() => renderDoubleWidget(), 500);
                } else {
                  document.getElementById("result").textContent =
                    "Both challenges solved!";
                  showMessage();
                }
              },
              "error-callback": () => {
                document.getElementById("result").textContent =
                  "Verification failed.";
              },
            });
          }

          renderDoubleWidget();
        });

      document
        .getElementById("multi-captcha-btn")
        .addEventListener("click", () => {
          if (!turnstileReady || !recaptchaReady)
            return alert("Scripts still loading…");

          let multiSolveCount = 0;
          const container = document.getElementById("captcha-container");
          container.innerHTML = "";
          container.classList.add("visible");
          document.getElementById("result").textContent = "";
          hideMessage();

          function renderMultiTurnstile() {
            container.innerHTML = "";
            turnstile.render(container, {
              sitekey: SITEKEY,
              callback: () => {
                multiSolveCount++;
                document.getElementById("result").textContent =
                  "Solve " + multiSolveCount + "/3 — keep going.";
                if (multiSolveCount < 2) {
                  setTimeout(() => renderMultiTurnstile(), 500);
                } else {
                  setTimeout(() => renderMultiRecaptcha(), 500);
                }
              },
              "error-callback": () => {
                document.getElementById("result").textContent =
                  "Verification failed.";
              },
            });
          }

          function renderMultiRecaptcha() {
            container.innerHTML = "";
            document.getElementById("result").textContent =
              "Solve 2/3 — one more (reCAPTCHA).";
            grecaptcha.render(container, {
              sitekey: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI",
              callback: () => {
                multiSolveCount++;
                document.getElementById("result").textContent =
                  "All 3 challenges solved!";
                showMessage();
              },
              "error-callback": () => {
                document.getElementById("result").textContent =
                  "reCAPTCHA verification failed.";
              },
            });
          }

          renderMultiTurnstile();
        });

      document
        .getElementById("captcha-redirect-btn")
        .addEventListener("click", () => {
          window.location.href =
            "https://brunolm.com/captcha-tests/cloudflare2.html?url=https://brunolm.com/captcha-tests/cloudflare.html?ok=1";
        });

      document.getElementById("captcha-btn").addEventListener("click", () => {
        if (!turnstileReady) return alert("Turnstile script still loading…");

        if (widgetId !== null) {
          turnstile.reset(widgetId);
          document.getElementById("result").textContent = "";
          hideMessage();
          return;
        }

        renderWidget();
      });

      document.getElementById("recaptcha-btn").addEventListener("click", () => {
        if (!recaptchaReady) return alert("reCAPTCHA script still loading…");
        const container = document.getElementById("captcha-container");
        container.innerHTML = "";
        container.classList.add("visible");
        document.getElementById("result").textContent = "";
        hideMessage();

        grecaptcha.render(container, {
          sitekey: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI",
          callback: () => {
            document.getElementById("result").textContent = "reCAPTCHA solved!";
            showMessage();
          },
          "error-callback": () => {
            document.getElementById("result").textContent =
              "reCAPTCHA verification failed.";
          },
        });
      });
    </script>
  </body>
</html>
